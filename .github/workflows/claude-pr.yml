name: Claude Code - PR Review

on:
  pull_request_review_comment:
    types: [created]
  issue_comment:
    types: [created]

jobs:
  handle:
    # PR 댓글만 처리, 봇 자신의 댓글 무시
    if: >
      github.event.issue.pull_request &&
      !endsWith(github.event.comment.user.login, '[bot]')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: React with eyes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          COMMENT_ID=${{ github.event.comment.id }}
          if [ "${{ github.event_name }}" = "pull_request_review_comment" ]; then
            gh api repos/${{ github.repository }}/pulls/comments/${COMMENT_ID}/reactions -X POST -f content=eyes
          else
            gh api repos/${{ github.repository }}/issues/comments/${COMMENT_ID}/reactions -X POST -f content=eyes
          fi

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout PR branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER=${{ github.event.issue.number || github.event.pull_request.number }}
          gh pr checkout "$PR_NUMBER"

      - uses: astral-sh/setup-uv@v6

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Build prompt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COMMENT_BODY: ${{ github.event.comment.body }}
          COMMENT_AUTHOR: ${{ github.event.comment.user.login }}
        run: |
          PR_NUMBER=${{ github.event.issue.number || github.event.pull_request.number }}

          PR_BODY=$(gh pr view "$PR_NUMBER" --json body -q .body)
          PR_DIFF=$(gh pr diff "$PR_NUMBER")
          COMMENTS=$(gh pr view "$PR_NUMBER" --json comments -q '.comments[] | "---\n\(.author.login): \(.body)"')
          REVIEW_COMMENTS=$(gh api repos/${{ github.repository }}/pulls/${PR_NUMBER}/comments -q '.[] | "---\n\(.user.login) (\(.path):\(.line)):\n\(.body)"')

          cat > /tmp/prompt.txt <<PROMPT_EOF
          당신은 이 저장소의 자동화된 개발 에이전트입니다.

          PR #${PR_NUMBER}에 새 댓글이 달렸습니다.

          댓글 작성자: ${COMMENT_AUTHOR}
          댓글 내용: ${COMMENT_BODY}

          PR 본문:
          ${PR_BODY}

          PR diff:
          ${PR_DIFF}

          전체 댓글 히스토리:
          ${COMMENTS}

          리뷰 댓글:
          ${REVIEW_COMMENTS}

          ## 지침

          1. 댓글 내용을 분석하세요.
          2. 코드 수정이 필요하면:
             - 현재 PR 브랜치에서 코드를 수정하세요.
             - ruff check, ruff format, ty check, pytest 를 모두 통과시키세요.
             - 커밋하고 푸시하세요.
             - 무엇을 왜 바꾸었는지 PR에 댓글로 남기세요.
          3. 코드 수정이 필요 없으면:
             - 질문에 답하거나 의견을 남기세요.

          ## 글쓰기 규칙

          PR 댓글 등 GitHub에 남기는 모든 글은:
          - 댓글 작성자를 고객이라고 생각하세요. 감사 인사로 시작하세요.
          - 개발자가 아닌 사람도 이해할 수 있도록 친절하고 쉽게 쓰세요.
          - 전문 용어를 써야 할 때는 간단한 설명을 함께 적으세요.
          - 왜 이렇게 바꾸었는지(이유)를 먼저 쓰고, 무엇을 바꾸었는지(내용)를 그 다음에 쓰세요.
          - 변경 사항은 사용자 입장에서 달라지는 동작으로 설명하세요 (코드/파일 이름 X).
          - 딱딱한 어투 대신 자연스럽고 읽기 편한 한국어를 사용하세요.

          ## 변경 금지 파일

          다음 파일은 절대 수정하지 마세요:
          - .github/workflows/* (CI/CD 설정)
          - CLAUDE.md, AGENTS.md (에이전트 설정)
          - .env, .env.example (환경 변수)
          - pyproject.toml (프로젝트 설정)

          ## 기타 규칙

          - CLAUDE.md 의 프로젝트 규칙을 따르세요
          - ruff, ty, pytest를 반드시 통과시키세요: uv run --group dev ruff check . && uv run --group dev ruff format --check . && uv run --group dev ty check . && uv run --group dev pytest tests/ -v
          - 기존 코드 스타일을 따르세요
          - 한국어로 커뮤니케이션하세요
          PROMPT_EOF

      - name: Run Claude Code
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: claude --dangerously-skip-permissions -p "$(cat /tmp/prompt.txt)"
