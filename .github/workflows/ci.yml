name: CI

on:
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6

      - name: Lint
        run: uv run --group dev ruff check .

      - name: Format
        run: uv run --group dev ruff format --check .

      - name: Test
        run: uv run --group dev pytest tests/ -v
