name: Claude Code - Issue Handler

on:
  issues:
    types: [opened, edited]
  issue_comment:
    types: [created]

jobs:
  handle:
    # 봇 자신의 댓글에는 반응하지 않음, PR 댓글은 별도 워크플로우에서 처리
    if: >
      !github.event.issue.pull_request &&
      (
        (github.event_name == 'issues') ||
        (github.event_name == 'issue_comment' && !endsWith(github.event.comment.user.login, '[bot]'))
      )
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: React with eyes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh api repos/${{ github.repository }}/issues/${{ github.event.issue.number }}/reactions -X POST -f content=eyes

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v6

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Build prompt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          ISSUE_NUMBER=${{ github.event.issue.number }}
          ISSUE_BODY=$(gh issue view "$ISSUE_NUMBER" --json body -q .body)

          COMMENTS=""
          if [ "$EVENT_NAME" = "issue_comment" ]; then
            COMMENTS=$(gh issue view "$ISSUE_NUMBER" --json comments -q '.comments[] | "---\n\(.author.login): \(.body)"')
          fi

          cat > /tmp/prompt.txt <<PROMPT_EOF
          당신은 이 저장소의 자동화된 개발 에이전트입니다.

          GitHub 이슈 #${ISSUE_NUMBER}를 처리하세요.

          제목: ${ISSUE_TITLE}
          본문:
          ${ISSUE_BODY}

          댓글 히스토리:
          ${COMMENTS}

          ## 질문 vs 바로 구현

          다음 중 하나라도 해당하면 질문 없이 바로 구현하세요:
          - 의도가 충분히 짐작 가능한 경우
          - 구현 방법이 하나뿐인 경우
          - 되돌리기 쉬운 작은 변경인 경우

          다음에 해당할 때만 gh issue comment 으로 질문하세요:
          - 서로 다른 결과를 낳는 해석이 2개 이상일 때
          - 기존 게임 규칙을 바꿔야 할 때 (의도한 건지 확인 필요)
          - 요청이 프로젝트 규칙(새 슬래시 커맨드 금지 등)과 충돌할 때

          질문할 때는 선택지를 제시하되, 다른 방향도 열어두세요.
          예: "A로 할까요, B로 할까요? 또는 다른 방향이 있으면 알려주세요!"
          열린 질문("어떻게 하고 싶으세요?")은 피하세요.
          질문이 있으면 코드 변경 없이 질문만 하고 종료하세요.

          ## 구현

          구현할 때:
          - 새 브랜치를 만드세요 (issue-${ISSUE_NUMBER}-설명)
          - 코드를 수정하세요
          - ruff check, ruff format, ty check, pytest 를 모두 통과시키세요
          - 커밋하고 PR을 여세요

          구현할 수 없으면 PR 없이 이슈에 댓글로 이유를 설명하세요.

          ## PR 작성 규칙

          PR은 이슈를 등록한 사람에게 보내는 답장이라고 생각하세요.

          본문 구성:
          - **한 줄 요약**: "~를 ~하도록 바꿨습니다" (기술 용어 없이)
          - **바뀐 점**: 사용자 입장에서 달라지는 동작을 설명 (코드/파일 이름 X)
          - **확인 방법**: 슬랙에서 어떻게 테스트하면 되는지 (예: "/새게임 마피아를 실행하면 ~")
          - 본문 맨 아래에 "Closes #${ISSUE_NUMBER}" 를 포함하세요

          제목은 이슈 제목과 비슷한 톤으로 짧게 쓰세요.

          ## 글쓰기 규칙

          이슈 댓글, PR 본문, PR 댓글 등 GitHub에 남기는 모든 글은:
          - 이슈 작성자를 고객이라고 생각하세요. 감사 인사로 시작하세요.
          - 개발자가 아닌 사람도 이해할 수 있도록 친절하고 쉽게 쓰세요.
          - 전문 용어를 써야 할 때는 간단한 설명을 함께 적으세요.
          - 왜 이렇게 바꾸었는지(이유)를 먼저 쓰고, 무엇을 바꾸었는지(내용)를 그 다음에 쓰세요.
          - 변경 사항은 목록으로 정리하세요.
          - 딱딱한 어투 대신 자연스럽고 읽기 편한 한국어를 사용하세요.

          ## 변경 금지 파일

          다음 파일은 절대 수정하지 마세요:
          - .github/workflows/* (CI/CD 설정)
          - CLAUDE.md, AGENTS.md (에이전트 설정)
          - .env, .env.example (환경 변수)
          - pyproject.toml (프로젝트 설정)

          ## 기타 규칙

          - CLAUDE.md 의 프로젝트 규칙을 따르세요
          - ruff, ty, pytest를 반드시 통과시키세요: uv run --group dev ruff check . && uv run --group dev ruff format --check . && uv run --group dev ty check . && uv run --group dev pytest tests/ -v
          - 기존 코드 스타일을 따르세요
          - 한국어로 커뮤니케이션하세요
          PROMPT_EOF

      - name: Run Claude Code
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: claude --dangerously-skip-permissions -p "$(cat /tmp/prompt.txt)"
